<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#FAF0E6">
<title>Речевой аналитик</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  /* Сброс отступов для мобильных */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    width: 100%;
  }

  /* СВЕТЛЫЙ ФОН */
  body {
    background: #FAF0E6 !important;
    color: #1A1A1A !important;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1rem;
  }

  /* Анимации */
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @keyframes fadeSlideUp {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .typing-dot {
    animation: blink 1.4s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  .message-in {
    animation: fadeSlideUp 0.3s ease-out;
  }

  .fade-in {
    animation: fadeIn 0.2s ease-in;
  }

  /* Кастомный скроллбар */
  .custom-scroll::-webkit-scrollbar { width: 4px; }
  .custom-scroll::-webkit-scrollbar-track { background: #E8DDD0; border-radius: 10px; }
  .custom-scroll::-webkit-scrollbar-thumb { background: #B8A99A; border-radius: 10px; }

  /* Эффекты кнопок */
  button {
    transition: all 0.2s ease;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  button:active {
    transform: scale(0.96);
  }

  /* ===== СТИЛИ СООБЩЕНИЙ ===== */
  .user-message {
    background: #C9A87C;
    box-shadow: 0 4px 12px rgba(201, 168, 124, 0.15);
    color: #FFFFFF !important;
  }

  .bot-message {
    background: #F5EDE4;
    border: 1px solid rgba(201, 168, 124, 0.2);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
    color: #1A1A1A !important;
  }

  .bot-message .text-gray-400,
  .bot-message .text-xs {
    color: #8B7A6B !important;
  }

  .message-wrapper {
    animation: fadeSlideUp 0.3s ease-out;
  }

  /* Окно чата — мягкий не-белый фон */
  .main-container {
    background: #FCFAF5;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(201, 168, 124, 0.2);
    box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.08);
  }

  /* Кнопка переключения языка */
  .lang-btn {
    background: rgba(201, 168, 124, 0.15);
    backdrop-filter: blur(4px);
    padding: 4px 10px;
    border-radius: 40px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid rgba(201, 168, 124, 0.3);
    color: #1A1A1A !important;
  }

  .lang-btn:hover {
    background: #C9A87C;
    color: #FFFFFF !important;
    border-color: #C9A87C;
  }

  /* Адаптивные стили */
  @media (max-width: 767px) {
    body {
      padding: 0 !important;
      background: #FAF0E6 !important;
    }

    .main-container {
      border-radius: 0 !important;
      height: 100% !important;
      width: 100% !important;
      background: #FCFAF5 !important;
      backdrop-filter: none !important;
      border: none !important;
      position: fixed !important;
      margin: 0 !important;
    }

    .user-message, .bot-message {
      border-radius: 1rem !important;
    }

    .subtitle {
      display: none;
    }
  }

  @media (min-width: 768px) {
    body {
      padding: 1rem !important;
    }

    .main-container {
      height: 90vh !important;
      max-width: 28rem !important;
      width: 100% !important;
      border-radius: 2rem !important;
      position: relative !important;
    }
  }
</style>
</head>
<body>

<div class="main-container w-full flex flex-col overflow-hidden">

  <!-- Шапка -->
  <div class="p-5 border-b border-[#C9A87C]/20" style="background: rgba(194, 166, 131, 0.4);">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 bg-[#81c78c] rounded-full animate-pulse"></div>
        <h1 class="text-lg font-semibold tracking-tight" style="color: #1A1A1A;">
          Речевой аналитик
        </h1>
      </div>
      <div class="flex items-center gap-2">
        <button id="langToggleBtn" class="lang-btn">
          🇷🇺 RU
        </button>
      </div>
    </div>
    <p class="subtitle text-xs mt-1" style="color: rgba(26, 26, 26, 0.6);">Определяю стиль и помогаю общаться конструктивно</p>
  </div>

  <!-- Область чата -->
  <div id="chat" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scroll" style="-webkit-overflow-scrolling: touch;"></div>

  <!-- Индикатор печати -->
  <div id="typingIndicator" class="hidden px-4 py-2">
    <div class="rounded-2xl rounded-bl-sm px-4 py-2 inline-flex items-center gap-1 bg-white/80 backdrop-blur-sm border border-[#C9A87C]/30 shadow-sm">
      <span class="text-xs text-[#C9A87C] font-medium">Анализирую</span>
      <div class="flex gap-1 ml-1">
        <div class="w-1.5 h-1.5 bg-[#C9A87C] rounded-full typing-dot"></div>
        <div class="w-1.5 h-1.5 bg-[#C9A87C] rounded-full typing-dot"></div>
        <div class="w-1.5 h-1.5 bg-[#C9A87C] rounded-full typing-dot"></div>
      </div>
    </div>
  </div>

  <!-- Поле ввода -->
  <div class="p-4 border-t border-[#C9A87C]/20" style="background: rgba(194, 166, 131, 0.4);">
    <div class="flex items-center gap-2">
      <div class="relative flex-1">
        <input id="input" type="text" placeholder="Напишите сообщение..."
               class="w-full p-3 bg-white border-0 rounded-2xl focus:outline-none focus:ring-0 focus:border-transparent focus:border-0 transition-all text-base placeholder:text-[#B8A99A]"
               style="color: #1A1A1A; outline: none; box-shadow: none;"
               onkeypress="handleEnterKey(event)">
      </div>
      <button onclick="sendMessage()" class="w-11 h-11 rounded-full flex items-center justify-center transition-all flex-shrink-0 shadow-sm" style="background: #C9A87C;" title="Отправить">
        <svg class="w-5 h-5" style="color: #FFFFFF;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
        </svg>
      </button>
    </div>

    <div class="flex gap-2 mt-3">
      <button onclick="soften()" class="flex-1 px-3 py-2 rounded-xl transition-all text-sm font-medium bg-white text-[#1A1A1A] border border-[#C9A87C]/40 hover:bg-[#C9A87C] hover:text-white hover:border-[#C9A87C] shadow-sm">
        ✏️ Смягчить
      </button>
      <button onclick="reply()" class="flex-1 px-3 py-2 rounded-xl transition-all text-sm font-medium bg-white text-[#1A1A1A] border border-[#C9A87C]/40 hover:bg-[#C9A87C] hover:text-white hover:border-[#C9A87C] shadow-sm">
        💬 Ответить
      </button>
      <button id="dialogModeBtn" onclick="toggleDialogMode()" class="flex-1 px-3 py-2 rounded-xl transition-all text-sm font-medium bg-white text-[#1A1A1A] border border-[#C9A87C]/40 hover:bg-[#C9A87C] hover:text-white hover:border-[#C9A87C] shadow-sm">
        💭 Диалог
      </button>
    </div>
  </div>

</div>

<script src="/static/js/app.js"></script>
</body>
</html>
