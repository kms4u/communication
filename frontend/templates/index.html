<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#1A1D2F">
<title>Речевой аналитик</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  /* Сброс отступов для мобильных */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    width: 100%;
  }

  /* Принудительный градиент для фона */
  body {
    background: linear-gradient(135deg, #1A1D2F 0%, #252A41 100%) !important;
    color: #FFFFFF !important;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1rem;
  }

  /* Дополнительные кастомные анимации */
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @keyframes fadeSlideUp {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .typing-dot {
    animation: blink 1.4s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  .message-in {
    animation: fadeSlideUp 0.3s ease-out;
  }

  .fade-in {
    animation: fadeIn 0.2s ease-in;
  }

  /* Кастомный скроллбар */
  .custom-scroll::-webkit-scrollbar {
    width: 5px;
  }

  .custom-scroll::-webkit-scrollbar-track {
    background: #252A41;
    border-radius: 10px;
  }

  .custom-scroll::-webkit-scrollbar-thumb {
    background: #6C63FF;
    border-radius: 10px;
  }

  .custom-scroll::-webkit-scrollbar-thumb:hover {
    background: #8B84FF;
  }

  /* Эффекты кнопок */
  button {
    transition: all 0.2s ease;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  button:active {
    transform: scale(0.96);
  }

  /* Стили для сообщений */
  .user-message {
    background: linear-gradient(135deg, #6C63FF, #8B84FF);
    box-shadow: 0 4px 16px rgba(108, 99, 255, 0.3);
    color: #FFFFFF;
  }

  .bot-message {
    background: rgba(37, 42, 65, 0.9);
    border: 1px solid rgba(108, 99, 255, 0.2);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    color: #FFFFFF;
  }

  /* Плавное появление сообщений */
  .message-wrapper {
    animation: fadeSlideUp 0.3s ease-out;
  }

  /* Стили для основного контейнера */
  .main-container {
    background: rgba(37, 42, 65, 0.5);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(108, 99, 255, 0.2);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  }

  /* Стили для кнопки переключения языка */
  .lang-btn {
    background: rgba(108, 99, 255, 0.15);
    backdrop-filter: blur(4px);
    padding: 4px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    transition: all 0.2s ease;
    border: 1px solid rgba(108, 99, 255, 0.3);
    color: #FFFFFF !important;
  }

  .lang-btn:hover {
    background: rgba(108, 99, 255, 0.3);
    transform: scale(1.02);
  }

  .lang-btn:active {
    transform: scale(0.95);
  }

  /* Адаптивные стили */
  @media (max-width: 767px) {
    body {
      padding: 0 !important;
      background: #1A1D2F !important;
    }

    /* На телефонах убираем внутреннее окно */
    .main-container {
      border-radius: 0 !important;
      height: 100% !important;
      max-width: 100% !important;
      width: 100% !important;
      background: transparent !important;
      backdrop-filter: none !important;
      border: none !important;
      box-shadow: none !important;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      margin: 0 !important;
    }

    /* Упрощаем сообщения на телефонах */
    .user-message, .bot-message {
      border-radius: 1rem !important;
    }

    /* Убираем подзаголовок на телефонах */
    .subtitle {
      display: none;
    }
  }

  /* Для планшетов и больше */
  @media (min-width: 768px) {
    body {
      padding: 1rem !important;
    }

    .main-container {
      height: 90vh !important;
      max-width: 28rem !important;
      width: 100% !important;
      border-radius: 1.5rem !important;
      position: relative !important;
    }
  }
</style>
</head>
<body>

<div class="main-container w-full flex flex-col overflow-hidden">

  <!-- Шапка -->
  <div class="p-5 border-b border-[#6C63FF]/20" style="background: rgba(37, 42, 65, 0.5);">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 bg-[#6C63FF] rounded-full animate-pulse"></div>
        <h1 class="text-lg font-semibold tracking-tight" style="color: #FFFFFF;">
          Речевой аналитик
        </h1>
      </div>
      <div class="flex items-center gap-2">
        <button id="langToggleBtn" class="lang-btn">
          🇷🇺 RU
        </button>
      </div>
    </div>
    <p class="subtitle text-xs mt-1" style="color: rgba(255, 255, 255, 0.6);">Определяю стиль и помогаю общаться конструктивно</p>
  </div>

  <!-- Область чата -->
  <div id="chat" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scroll" style="-webkit-overflow-scrolling: touch;"></div>

  <!-- Индикатор печати -->
  <div id="typingIndicator" class="hidden px-4 py-2">
    <div class="rounded-2xl rounded-bl-sm px-4 py-2 inline-flex items-center gap-1 border border-[#6C63FF]/25" style="background: rgba(37, 42, 65, 0.9); backdrop-filter: blur(4px); box-shadow: 0 2px 8px rgba(0,0,0,0.2);">
      <span class="text-xs" style="color: #FFFFFF;">Анализирую</span>
      <div class="flex gap-1 ml-1">
        <div class="w-1.5 h-1.5 bg-[#6C63FF] rounded-full typing-dot"></div>
        <div class="w-1.5 h-1.5 bg-[#6C63FF] rounded-full typing-dot"></div>
        <div class="w-1.5 h-1.5 bg-[#6C63FF] rounded-full typing-dot"></div>
      </div>
    </div>
  </div>

  <!-- Поле ввода -->
  <div class="p-4 border-t border-[#6C63FF]/20" style="background: rgba(37, 42, 65, 0.5);">
    <div class="flex items-center gap-2">
      <div class="relative flex-1">
        <input id="input" type="text" placeholder="Напишите сообщение..."
               class="w-full p-3 border rounded-xl focus:outline-none focus:ring-0 focus:border-[#6C63FF] transition-all text-base"
               style="background: rgba(37, 42, 65, 0.9); border-color: rgba(108, 99, 255, 0.3); color: #FFFFFF;"
               onkeypress="handleEnterKey(event)">
      </div>
      <button onclick="sendMessage()" class="w-11 h-11 rounded-full flex items-center justify-center transition-all flex-shrink-0" style="background: #6C63FF;" title="Отправить">
        <svg class="w-5 h-5" style="color: #FFFFFF;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
        </svg>
      </button>
    </div>

    <div class="flex gap-2 mt-3">
      <button onclick="soften()" class="flex-1 px-3 py-1.5 rounded-lg transition-all text-sm font-medium" style="background: rgba(108, 99, 255, 0.15); color: #FFFFFF; border: 1px solid rgba(108, 99, 255, 0.25);" title="Смягчить сообщение">
        ✏️ Смягчить
      </button>
      <button onclick="reply()" class="flex-1 px-3 py-1.5 rounded-lg transition-all text-sm font-medium" style="background: rgba(108, 99, 255, 0.15); color: #FFFFFF; border: 1px solid rgba(108, 99, 255, 0.25);" title="Конструктивный ответ">
        💬 Ответить
      </button>
      <button id="dialogModeBtn" onclick="toggleDialogMode()" class="flex-1 px-3 py-1.5 rounded-lg transition-all text-sm font-medium" style="background: rgba(108, 99, 255, 0.15); color: #FFFFFF; border: 1px solid rgba(108, 99, 255, 0.25);">
        💭 Диалог
      </button>
    </div>
  </div>

</div>

<script src="/static/js/app.js"></script>
</body>
</html>
